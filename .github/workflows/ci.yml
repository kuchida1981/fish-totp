name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup fish environment
        uses: ./.github/actions/setup-fish-env

      - name: Install fish-totp via fisher
        run: |
          fish -c "fisher install ."

      - name: Run tests
        run: |
          fish test/run.fish
