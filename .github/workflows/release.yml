name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "リリースするバージョン (例: 0.2.0、v プレフィックスなし)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure running on main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::release workflow must be run on the main branch (got ${{ github.ref }})"
            exit 1
          fi

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be in X.Y.Z format without a 'v' prefix, got: $VERSION"
            exit 1
          fi

      - name: Add fish PPA
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y fish jq oathtool python3 curl

      - name: Install fisher
        run: |
          fish -c "curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher"

      - name: Install fish-totp via fisher
        run: |
          fish -c "fisher install ."

      - name: Run tests
        run: |
          fish test/run.fish

      - name: Bump TOTP_VERSION and commit
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/set -g TOTP_VERSION \".*\"/set -g TOTP_VERSION \"$VERSION\"/" conf.d/fish-totp.fish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add conf.d/fish-totp.fish
          git commit -m "chore: release $VERSION"
          git push origin HEAD:main

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" --generate-notes
